<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Your Optimized Image - Ultimate Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f8fafc; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    <div class="max-w-xl w-full bg-white p-8 md:p-12 rounded-[3rem] shadow-2xl text-center">
        <h1 class="text-3xl font-black text-slate-900 mb-6">Optimization Complete!</h1>
        
        <div class="mb-8 p-4 bg-blue-50 rounded-3xl inline-block">
            <img id="resultPreview" class="max-h-64 rounded-2xl mx-auto shadow-md border-4 border-white" src="" alt="Preview">
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-2xl">
                <p class="text-xs font-bold text-slate-400 uppercase">Old Size</p>
                <p id="oldSizeDisplay" class="font-bold text-red-500">-</p>
            </div>
            <div class="bg-green-50 p-4 rounded-2xl">
                <p class="text-xs font-bold text-green-400 uppercase">Optimized</p>
                <p id="newSizeDisplay" class="font-bold text-green-600">-</p>
            </div>
        </div>

        <a id="downloadLink" download="optimized-image.jpg" class="block w-full bg-blue-600 text-white font-black text-xl py-5 rounded-2xl shadow-xl hover:bg-blue-700 transition-all mb-4 cursor-pointer">
            Download Image
        </a>
        
        <a href="image-resizer.html" class="text-slate-400 font-bold hover:text-blue-600 transition-colors italic">Resize Another Image</a>
    </div>

    <script>
        window.onload = () => {
            const imgData = localStorage.getItem('compressedImg');
            const oldSize = localStorage.getItem('oldSize');
            const newSize = localStorage.getItem('newSize');
            const imgName = localStorage.getItem('imgName');

            if(!imgData) {
                location.assign("image-resizer.html");
                return;
            }

            document.getElementById('resultPreview').src = imgData;
            document.getElementById('oldSizeDisplay').innerText = oldSize + " KB";
            document.getElementById('newSizeDisplay').innerText = newSize + " KB";
            document.getElementById('downloadLink').href = imgData;
            document.getElementById('downloadLink').download = "optimized-" + imgName;
        }
    </script>
</body>
</html>
